<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KLASK Tournament</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Source+Code+Pro:wght@400;600&display=swap');
    :root {
      --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;
      --accent:#4f8ef7;--accent2:#f7c44f;--accent3:#4ff7a0;--danger:#f74f4f;
      --text:#f0f0f5;--muted:#7a7a8a;--radius:6px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
    .back-link{font-size:0.82rem;color:var(--muted);text-decoration:none;letter-spacing:0.03em;}
    .back-link:hover{color:var(--text);}
    .site-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.08em;color:var(--accent2);}
    .live-badge{font-family:'Source Code Pro',monospace;font-size:0.72rem;padding:0.2rem 0.65rem;border-radius:20px;background:rgba(79,255,160,0.12);border:1px solid var(--accent3);color:var(--accent3);letter-spacing:0.06em;}
    main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
    #loading{text-align:center;padding:4rem 2rem;color:var(--muted);font-family:'Source Code Pro',monospace;font-size:0.9rem;}
    .spinner{display:inline-block;width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:1rem;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #content{display:none;}
    .section-header{display:flex;align-items:baseline;gap:0.75rem;margin:2.5rem 0 1.25rem;}
    .section-header h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.06em;color:var(--accent2);}
    .section-header .count{font-family:'Source Code Pro',monospace;font-size:0.75rem;color:var(--muted);}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2.5rem;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;}
    .stat-card .label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;font-family:'Source Code Pro',monospace;margin-bottom:0.4rem;}
    .stat-card .value{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent);letter-spacing:0.04em;}
    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:2.5rem;}
    table{width:100%;border-collapse:collapse;font-size:0.88rem;}
    thead tr{background:var(--surface2);border-bottom:1px solid var(--border);}
    th{padding:0.7rem 1rem;text-align:left;font-size:0.72rem;font-family:'Source Code Pro',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;white-space:nowrap;}
    th.right,td.right{text-align:right;}
    th.center,td.center{text-align:center;}
    td{padding:0.65rem 1rem;border-bottom:1px solid var(--border);color:var(--text);}
    tr:last-child td{border-bottom:none;}
    tbody tr:hover{background:var(--surface2);}
    .rank{font-family:'Source Code Pro',monospace;font-size:0.75rem;color:var(--muted);width:32px;}
    .rank.gold{color:#ffd700;}.rank.silver{color:#c0c0c0;}.rank.bronze{color:#cd7f32;}
    .player-name{font-weight:500;}
    .team-pill{display:inline-block;font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:20px;font-family:'Source Code Pro',monospace;white-space:nowrap;}
    .win-pct{font-family:'Source Code Pro',monospace;font-size:0.82rem;}
    .win-pct.high{color:var(--accent3);}.win-pct.mid{color:var(--accent2);}.win-pct.low{color:var(--danger);}
    .pct-bar-wrap{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:0.5rem;}
    .pct-bar{height:100%;border-radius:2px;background:var(--accent3);}
    .pct-bar.mid{background:var(--accent2);}.pct-bar.low{background:var(--danger);}
    .score-badge{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.05em;}
    .score-badge .w{color:var(--accent3);}.score-badge .sep{color:var(--muted);margin:0 0.1rem;}.score-badge .l{color:var(--danger);}
    .won{color:var(--accent3);font-weight:500;font-size:0.78rem;font-family:'Source Code Pro',monospace;}
    .lost{color:var(--danger);font-weight:500;font-size:0.78rem;font-family:'Source Code Pro',monospace;}
    .filter-row{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem;}
    .filter-btn{padding:0.3rem 0.85rem;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;font-size:0.8rem;transition:all 0.15s;}
    .filter-btn:hover{border-color:var(--accent);color:var(--text);}
    .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
    .match-num{font-family:'Source Code Pro',monospace;font-size:0.72rem;color:var(--muted);}
    .t-panthers{background:rgba(79,142,247,0.15);color:#4f8ef7;border:1px solid rgba(79,142,247,0.3);}
    .t-peacocks{background:rgba(247,196,79,0.15);color:#f7c44f;border:1px solid rgba(247,196,79,0.3);}
    .t-termites{background:rgba(247,79,79,0.15);color:#f74f4f;border:1px solid rgba(247,79,79,0.3);}
    .t-guardians{background:rgba(79,255,160,0.15);color:#4ff7a0;border:1px solid rgba(79,255,160,0.3);}
    .t-doom{background:rgba(180,79,247,0.15);color:#b44ff7;border:1px solid rgba(180,79,247,0.3);}
    .t-cougars{background:rgba(247,130,79,0.15);color:#f7824f;border:1px solid rgba(247,130,79,0.3);}
    @media(max-width:600px){header{padding:0.75rem 1rem;}main{padding:1.25rem 1rem;}.site-title{font-size:1.5rem;}th,td{padding:0.5rem 0.6rem;}}
  </style>
</head>
<body>
<header>
  <a href="../" class="back-link">&#8592; Kister Homeschool</a>
  <span class="site-title">KLASK Tournament</span>
  <span class="live-badge">&#9679; LIVE DATA</span>
</header>
<main>
  <div id="loading"><div class="spinner"></div><br>Loading tournament data&#8230;</div>
  <div id="content">
    <div class="stat-grid" id="stat-grid"></div>
    <div class="section-header"><h2>Team Standings</h2><span class="count" id="teams-count"></span></div>
    <div class="table-wrap"><table id="teams-table">
      <thead><tr><th class="center">#</th><th>Team</th><th class="right">W</th><th class="right">L</th><th class="right">GP</th><th>Win %</th><th class="right">Pts For</th><th class="right">Pts Against</th></tr></thead>
      <tbody></tbody>
    </table></div>
    <div class="section-header"><h2>Player Leaderboard</h2><span class="count" id="players-count"></span></div>
    <div class="table-wrap"><table id="players-table">
      <thead><tr><th class="center">#</th><th>Composer</th><th>Team</th><th class="right">W</th><th class="right">L</th><th class="right">GP</th><th>Win %</th><th class="right">Born</th><th>Opens</th></tr></thead>
      <tbody></tbody>
    </table></div>
    <div class="section-header"><h2>Match Log</h2><span class="count" id="matches-count"></span></div>
    <div class="filter-row" id="match-filters"></div>
    <div class="table-wrap"><table id="matches-table">
      <thead><tr><th>#</th><th>Player 1</th><th class="center">Score</th><th>Player 2</th><th>Result</th></tr></thead>
      <tbody></tbody>
    </table></div>
  </div>
</main>
<script>
const MATCHES_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRWrZyrlr5nuwNRGJfsnKPU8GTH02g8goiWo3YCWMDZZ1fi3GeXZiQYi9NDVDrjhyx5VrH-Tp_rCYVs/pub?gid=1348517281&single=true&output=csv';
const PLAYERS_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRWrZyrlr5nuwNRGJfsnKPU8GTH02g8goiWo3YCWMDZZ1fi3GeXZiQYi9NDVDrjhyx5VrH-Tp_rCYVs/pub?gid=2088474691&single=true&output=csv';
const TEAM_CLASS={'passaic panthers':'t-panthers','passaic peacocks':'t-peacocks','teaneck termites':'t-termites','garden state guardians':'t-guardians','rolling eye of doom':'t-doom','county cougars':'t-cougars'};
function teamClass(n){return TEAM_CLASS[n.toLowerCase().trim()]||'t-cougars';}
function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){vals.push(cur.trim());cur='';}
      else{cur+=line[i];}
    }
    vals.push(cur.trim());
    const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');return obj;
  });
}
async function fetchCSV(url){const res=await fetch(url);const text=await res.text();return parseCSV(text);}
function pct(w,total){if(total===0)return 0;return Math.round((w/total)*1000)/10;}
function pctClass(p){if(p>=60)return'high';if(p>=40)return'mid';return'low';}
function teamPill(name){const cls=teamClass(name);return`<span class="team-pill ${cls}">${name}</span>`;}
(async function(){
  try{
    const[matchRows,playerRows]=await Promise.all([fetchCSV(MATCHES_URL),fetchCSV(PLAYERS_URL)]);
    const playerInfo={};
    playerRows.forEach(r=>{if(r.player)playerInfo[r.player.trim()]={team:(r.team||'').trim(),birth_year:parseInt(r.birth_year)||0};});
    const matches=matchRows.filter(r=>{const s1=parseInt(r.score_1),s2=parseInt(r.score_2);return r.player_1&&r.player_2&&!isNaN(s1)&&!isNaN(s2)&&(s1===6||s2===6);});
    const playerStats={};
    function ep(name){if(!playerStats[name]){const info=playerInfo[name]||{team:'Unknown',birth_year:0};playerStats[name]={name,team:info.team,birth_year:info.birth_year,w:0,l:0,pf:0,pa:0};}}
    matches.forEach(r=>{
      const p1=r.player_1.trim(),p2=r.player_2.trim();
      const s1=parseInt(r.score_1),s2=parseInt(r.score_2);
      ep(p1);ep(p2);
      playerStats[p1].pf+=s1;playerStats[p1].pa+=s2;
      playerStats[p2].pf+=s2;playerStats[p2].pa+=s1;
      if(s1===6){playerStats[p1].w++;playerStats[p2].l++;}else{playerStats[p2].w++;playerStats[p1].l++;}
    });
    const teamStats={};
    Object.values(playerStats).forEach(p=>{
      const t=p.team||'Unknown';
      if(!teamStats[t])teamStats[t]={name:t,w:0,l:0,pf:0,pa:0};
      teamStats[t].w+=p.w;teamStats[t].l+=p.l;teamStats[t].pf+=p.pf;teamStats[t].pa+=p.pa;
    });
    const totalGames=matches.length;
    const closestGames=matches.filter(r=>Math.abs(parseInt(r.score_1)-parseInt(r.score_2))<=1).length;
    const topPlayer=Object.values(playerStats).filter(p=>p.w+p.l>0).sort((a,b)=>b.w-a.w)[0];
    document.getElementById('stat-grid').innerHTML=`
      <div class="stat-card"><div class="label">Total Matches</div><div class="value">${totalGames}</div></div>
      <div class="stat-card"><div class="label">Teams</div><div class="value">${Object.keys(teamStats).length}</div></div>
      <div class="stat-card"><div class="label">Active Composers</div><div class="value">${Object.keys(playerStats).length}</div></div>
      <div class="stat-card"><div class="label">Close Games (&le;1 pt)</div><div class="value">${closestGames}</div></div>
      <div class="stat-card"><div class="label">Top Composer</div><div class="value" style="font-size:1.2rem;padding-top:0.2rem;">${topPlayer?topPlayer.name:'—'}</div></div>`;
    const teamsSorted=Object.values(teamStats).sort((a,b)=>{const pa=pct(a.w,a.w+a.l),pb=pct(b.w,b.w+b.l);return pb-pa||b.w-a.w;});
    document.getElementById('teams-count').textContent=`${teamsSorted.length} teams`;
    document.querySelector('#teams-table tbody').innerHTML=teamsSorted.map((t,i)=>{
      const gp=t.w+t.l,p=pct(t.w,gp),pc=pctClass(p);
      const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      return`<tr><td class="rank center ${rc}">${i+1}</td><td>${teamPill(t.name)}</td><td class="right" style="color:var(--accent3)">${t.w}</td><td class="right" style="color:var(--danger)">${t.l}</td><td class="right" style="color:var(--muted)">${gp}</td><td><span class="win-pct ${pc}">${p}%</span><span class="pct-bar-wrap"><span class="pct-bar ${pc}" style="width:${p}%"></span></span></td><td class="right" style="font-family:'Source Code Pro',monospace;font-size:0.82rem;">${t.pf}</td><td class="right" style="font-family:'Source Code Pro',monospace;font-size:0.82rem;">${t.pa}</td></tr>`;
    }).join('');
    const playersSorted=Object.values(playerStats).filter(p=>p.w+p.l>0).sort((a,b)=>{const pa=pct(a.w,a.w+a.l),pb=pct(b.w,b.w+b.l);return pb-pa||b.w-a.w;});
    document.getElementById('players-count').textContent=`${playersSorted.length} composers`;
    const maxYear=Math.max(...playersSorted.map(p=>p.birth_year));
    document.querySelector('#players-table tbody').innerHTML=playersSorted.map((p,i)=>{
      const gp=p.w+p.l,pv=pct(p.w,gp),pc=pctClass(pv);
      const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const opens=p.birth_year===maxYear?'<span style="color:var(--accent2);font-size:0.72rem;">&#9733; opens</span>':'';
      return`<tr><td class="rank ${rc}">${i+1}</td><td class="player-name">${p.name}</td><td>${teamPill(p.team)}</td><td class="right" style="color:var(--accent3)">${p.w}</td><td class="right" style="color:var(--danger)">${p.l}</td><td class="right" style="color:var(--muted)">${gp}</td><td><span class="win-pct ${pc}">${pv}%</span><span class="pct-bar-wrap"><span class="pct-bar ${pc}" style="width:${pv}%"></span></span></td><td class="right" style="font-family:'Source Code Pro',monospace;font-size:0.82rem;color:var(--muted)">${p.birth_year}</td><td>${opens}</td></tr>`;
    }).join('');
    const allTeams=[...new Set(Object.values(playerInfo).map(p=>p.team))].filter(Boolean).sort();
    const filterRow=document.getElementById('match-filters');
    filterRow.innerHTML=`<button class="filter-btn active" data-filter="all">All</button>`+allTeams.map(t=>`<button class="filter-btn" data-filter="${t}">${t}</button>`).join('');
    document.getElementById('matches-count').textContent=`${matches.length} matches`;
    function renderMatches(filter){
      const filtered=filter==='all'?matches:matches.filter(r=>{
        const t1=(playerInfo[r.player_1.trim()]||{}).team||'';
        const t2=(playerInfo[r.player_2.trim()]||{}).team||'';
        return t1===filter||t2===filter;
      });
      document.querySelector('#matches-table tbody').innerHTML=[...filtered].reverse().map(r=>{
        const p1=r.player_1.trim(),p2=r.player_2.trim();
        const s1=parseInt(r.score_1),s2=parseInt(r.score_2);
        const p1won=s1===6;
        const t1=(playerInfo[p1]||{}).team||'';
        const t2=(playerInfo[p2]||{}).team||'';
        const by1=(playerInfo[p1]||{}).birth_year||0;
        const by2=(playerInfo[p2]||{}).birth_year||0;
        const serves=by1>by2?`<span style="color:var(--accent2);font-size:0.72rem;font-family:'Source Code Pro',monospace;">&#9655; ${p1} opens</span>`:by2>by1?`<span style="color:var(--accent2);font-size:0.72rem;font-family:'Source Code Pro',monospace;">&#9655; ${p2} opens</span>`:'';
        return`<tr><td class="match-num">${r.match_id}</td><td><span class="player-name">${p1}</span><br><span style="font-size:0.72rem;">${teamPill(t1)}</span></td><td class="center"><span class="score-badge"><span class="${p1won?'w':'l'}">${s1}</span><span class="sep">&#8212;</span><span class="${p1won?'l':'w'}">${s2}</span></span></td><td><span class="player-name">${p2}</span><br><span style="font-size:0.72rem;">${teamPill(t2)}</span></td><td><span class="${p1won?'won':'lost'}">${p1won?'WIN':'LOSS'}</span> ${p1}<br>${serves}</td></tr>`;
      }).join('');
    }
    renderMatches('all');
    filterRow.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        filterRow.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderMatches(btn.dataset.filter);
      });
    });
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
  }catch(e){
    document.getElementById('loading').innerHTML='<p style="color:var(--danger)">Failed to load data. Check your connection and refresh.</p><p style="color:var(--muted);font-size:0.8rem;margin-top:0.5rem;">'+e.message+'</p>';
  }
})();
</script>
</body>
</html>
